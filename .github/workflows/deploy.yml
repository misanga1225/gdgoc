name: Deploy to Cloud Functions 2nd gen

on:
  push:
    branches:
      - main

env:
  FUNCTION_NAME: gdgoc
  ARTIFACT_REGISTRY_REPO: cloud-run-source-deploy
  IMAGE_NAME: gdgoc-function

jobs:
  build-and-deploy:
    name: Build Rust binary and deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-unknown-linux-musl

      - name: Build Rust binary for linux/amd64
        run: |
          cargo build --release --target x86_64-unknown-linux-musl
          cp target/x86_64-unknown-linux-musl/release/gdgoc ./server

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          IMAGE_URI="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          docker build --platform linux/amd64 -f Dockerfile.gcf -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"
          echo "IMAGE_URI=${IMAGE_URI}" >> $GITHUB_ENV

      - name: Deploy to Cloud Functions 2nd gen
        run: |
          gcloud functions deploy ${{ env.FUNCTION_NAME }} \
            --gen2 \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --region="${{ secrets.GCP_REGION }}" \
            --image="${IMAGE_URI}" \
            --trigger-http \
            --allow-unauthenticated \
            --memory=512Mi \
            --cpu=1 \
            --timeout=60s \
            --min-instances=0 \
            --max-instances=10 \
            --set-env-vars="\
          GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }},\
          GCP_REGION=${{ secrets.GCP_REGION }},\
          STORAGE_BUCKET=${{ secrets.STORAGE_BUCKET }},\
          KMS_KEY_RING=${{ secrets.KMS_KEY_RING }},\
          KMS_KEY_NAME=${{ secrets.KMS_KEY_NAME }},\
          GEMINI_MODEL=${{ secrets.GEMINI_MODEL }}"
