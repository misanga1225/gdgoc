name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build check (backend/shared)
        run: cargo check -p gdgoc -p shared

  doctor-web:
    name: Doctor web build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: doctor/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: doctor

      - name: Build
        run: npm run build
        working-directory: doctor

  patient-web:
    name: Patient web build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: patient/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: patient

      - name: Build
        run: npm run build
        working-directory: patient
